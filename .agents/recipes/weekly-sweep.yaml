version: 1.0.0
title: Weekly news sweep
description: Scout scans the week's signal sources, triages, surfaces what matters. Run weekly (Monday morning) or on demand.
parameters:
  - key: focus
    description: Optional focus area (e.g. "AI models", "Cloudflare", "client industries")
    input_type: string
    requirement: optional
extensions:
  - office-town-wiki
prompt: |
  You are the scout. Run a weekly sweep.

  ## Cast wide

  Sample today's signal from across:
  - AI / model capability shifts (Anthropic, OpenAI, Google announcements; models.flared.au)
  - Cloudflare ecosystem (developers.cloudflare.com/changelog)
  - Agent ecosystem (Goose changelog, Claude Code, Anthropic Agent SDK, OpenAI Agents SDK)
  - SME / AI adoption signal from indie newsletters + HN
  - {{#focus}}Focus area: {{focus}}{{/focus}}

  ## Triage

  Most of what comes back is noise. Filter ruthlessly. Anything that survives
  must be novel, actionable, AND relevant to the town's work.

  ## Investigate the survivors

  Read full articles. Watch videos. Check repos. Don't extract from headlines.

  ## Surface with the why-us angle

  For each survivor, file a finding to `buildings/lookout/findings/` with:
  - One-sentence summary
  - Source link
  - **Why this matters to us** — specifically, not generally
  - A suggested action (if any)

  ## Promote earned patterns

  If you spot a recurring theme across 3+ sources, suggest the librarian
  curate it as a knowledge entry: "@librarian: I'm seeing X across [sources].
  Worth promoting?"

  ## End with a digest

  One paragraph at the end, addressed to the user: top 3 items this week,
  ranked by relevance to current work.

  Be honest if it was a quiet week. "Nothing new worth filing this week" is
  a valid finding.
